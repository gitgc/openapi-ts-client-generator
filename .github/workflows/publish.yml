name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Create and push tag
        id: tag
        run: |
          TAG="v0.0.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: bash scripts/publish.sh

      - name: Rename binaries
        run: |
          for rid in win-x64 win-arm64; do
            mv publish/${rid}/openapi-ts-client-generator.exe publish/${rid}/openapi-ts-client-generator-${rid}.exe
          done
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            mv publish/${rid}/openapi-ts-client-generator publish/${rid}/openapi-ts-client-generator-${rid}
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            publish/win-*/openapi-ts-client-generator-*.exe
            publish/linux-*/openapi-ts-client-generator-*
            publish/osx-*/openapi-ts-client-generator-*
